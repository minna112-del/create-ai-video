```html
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ভিডিও মেকার (Face Swap & Image to Video)</title>
    <!-- Tailwind CSS লোড করা হচ্ছে স্টাইলিংয়ের জন্য -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-800">

    <div class="max-w-4xl mx-auto p-6 mt-10 bg-white rounded-2xl shadow-xl">
        <h1 class="text-3xl font-bold text-center text-indigo-600 mb-2">AI ভিডিও জেনারেটর</h1>
        <p class="text-center text-gray-500 mb-8">ফেস সোয়াপ এবং ছবি থেকে ভিডিও তৈরি করুন</p>

        <!-- API Key ইনপুট -->
        <div class="mb-8 p-4 bg-yellow-50 border border-yellow-200 rounded-lg">
            <label class="block text-sm font-bold text-gray-700 mb-2" for="apiKey">আপনার Replicate API টোকেন দিন:</label>
            <input type="password" id="apiKey" placeholder="r8_..............................." 
                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <p class="text-xs text-gray-500 mt-2">বিঃদ্রঃ এই টোকেন আপনার ব্রাউজারেই থাকবে, সার্ভারে সেভ হবে না।</p>
        </div>

        <!-- ট্যাব নেভিগেশন -->
        <div class="flex border-b mb-6">
            <button onclick="switchTab('faceSwap')" id="tabFaceSwap" class="w-1/2 py-3 text-center font-semibold text-indigo-600 border-b-2 border-indigo-600">১. ফেস সোয়াপ</button>
            <button onclick="switchTab('imgToVideo')" id="tabImgToVideo" class="w-1/2 py-3 text-center font-semibold text-gray-500 hover:text-indigo-600">২. ছবি থেকে ভিডিও</button>
        </div>

        <!-- ফেস সোয়াপ সেকশন -->
        <div id="secFaceSwap" class="block">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">টার্গেট ভিডিও লিংক (URL):</label>
                    <input type="url" id="fsVideoUrl" placeholder="যে ভিডিওতে মুখ বসাতে চান তার লিংক" class="w-full px-4 py-2 border rounded-lg mb-4">
                    
                    <label class="block text-sm font-bold text-gray-700 mb-2">মুখের ছবির লিংক (URL):</label>
                    <input type="url" id="fsImageUrl" placeholder="যার মুখ বসাতে চান তার ছবির লিংক" class="w-full px-4 py-2 border rounded-lg mb-6">
                    
                    <button onclick="generateFaceSwap()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition">
                        ফেস সোয়াপ ভিডিও তৈরি করুন
                    </button>
                </div>
                <div class="bg-gray-50 p-4 rounded-lg border flex flex-col items-center justify-center min-h-[250px]">
                    <div id="fsStatus" class="text-gray-500 text-center mb-4">ফলাফল এখানে দেখানো হবে</div>
                    <video id="fsResultVideo" controls class="hidden w-full rounded-lg shadow-md"></video>
                </div>
            </div>
        </div>

        <!-- ছবি থেকে ভিডিও সেকশন -->
        <div id="secImgToVideo" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">রেফারেন্স ছবির লিংক (URL):</label>
                    <input type="url" id="i2vImageUrl" placeholder="যে ছবি অ্যানিমেট করতে চান তার লিংক" class="w-full px-4 py-2 border rounded-lg mb-6">
                    
                    <button onclick="generateImageToVideo()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition">
                        ছবি থেকে ভিডিও তৈরি করুন
                    </button>
                </div>
                <div class="bg-gray-50 p-4 rounded-lg border flex flex-col items-center justify-center min-h-[250px]">
                    <div id="i2vStatus" class="text-gray-500 text-center mb-4">ফলাফল এখানে দেখানো হবে</div>
                    <video id="i2vResultVideo" controls class="hidden w-full rounded-lg shadow-md"></video>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ট্যাব পরিবর্তনের লজিক
        function switchTab(tabName) {
            document.getElementById('secFaceSwap').classList.add('hidden');
            document.getElementById('secImgToVideo').classList.add('hidden');
            document.getElementById('tabFaceSwap').className = "w-1/2 py-3 text-center font-semibold text-gray-500 hover:text-indigo-600";
            document.getElementById('tabImgToVideo').className = "w-1/2 py-3 text-center font-semibold text-gray-500 hover:text-indigo-600";

            if (tabName === 'faceSwap') {
                document.getElementById('secFaceSwap').classList.remove('hidden');
                document.getElementById('tabFaceSwap').className = "w-1/2 py-3 text-center font-semibold text-indigo-600 border-b-2 border-indigo-600";
            } else {
                document.getElementById('secImgToVideo').classList.remove('hidden');
                document.getElementById('tabImgToVideo').className = "w-1/2 py-3 text-center font-semibold text-indigo-600 border-b-2 border-indigo-600";
            }
        }

        // Replicate API কল করার মেইন ফাংশন
        async function runReplicateModel(modelName, inputData, statusElementId, videoElementId) {
            const apiKey = document.getElementById('apiKey').value.trim();
            const statusEl = document.getElementById(statusElementId);
            const videoEl = document.getElementById(videoElementId);

            if (!apiKey) {
                statusEl.innerHTML = '<span class="text-red-500">অনুগ্রহ করে API Key দিন!</span>';
                return;
            }

            // UI আপডেট: লোডিং শুরু
            statusEl.innerHTML = '<div class="loader"></div> ভিডিও তৈরি হচ্ছে, দয়া করে অপেক্ষা করুন (কয়েক মিনিট লাগতে পারে)...';
            videoEl.classList.add('hidden');

            try {
                // ধাপ ১: Prediction তৈরি করা
                const proxyUrl = 'https://cors-anywhere.herokuapp.com/'; // CORS বাইপাস করার জন্য প্রক্সি (ডেভলপমেন্টের জন্য)
                // সতর্কতা: প্রোডাকশনের জন্য নিজস্ব ব্যাকএন্ড ব্যবহার করা উচিত। এখানে ব্রাউজার থেকে সরাসরি কলের জন্য প্রক্সি ব্যবহার করা হলো।
                // Replicate API সরাসরি ব্রাউজার থেকে কল করতে দেয় না CORS পলিসির কারণে। 
                // নোট: CORS Anywhere ব্যবহার করতে হলে একবার https://cors-anywhere.herokuapp.com/corsdemo এ গিয়ে অ্যাক্সেস নিতে হবে।

                const startResponse = await fetch('https://api.replicate.com/v1/predictions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Token ${apiKey}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        version: modelName,
                        input: inputData
                    })
                });

                if (!startResponse.ok) {
                    const errorData = await startResponse.json();
                    throw new Error(errorData.detail || 'API Request ব্যর্থ হয়েছে।');
                }

                const prediction = await startResponse.json();
                let predictionUrl = prediction.urls.get;

                // ধাপ ২: রেজাল্টের জন্য পোলিং (Polling) করা
                while (true) {
                    await new Promise(resolve => setTimeout(resolve, 3000)); // ৩ সেকেন্ড পর পর চেক করবে
                    
                    const checkResponse = await fetch(predictionUrl, {
                        headers: {
                            'Authorization': `Token ${apiKey}`
                        }
                    });
                    
                    const result = await checkResponse.json();

                    if (result.status === 'succeeded') {
                        statusEl.innerHTML = '<span class="text-green-500 font-bold">ভিডিও তৈরি সফল!</span>';
                        videoEl.src = result.output; // অথবা result.output[0] মডেল অনুযায়ী
                        videoEl.classList.remove('hidden');
                        break;
                    } else if (result.status === 'failed') {
                        throw new Error('ভিডিও তৈরি ব্যর্থ হয়েছে।');
                    } else {
                        statusEl.innerHTML = `<div class="loader"></div> প্রসেস হচ্ছে... (স্ট্যাটাস: ${result.status})`;
                    }
                }

            } catch (error) {
                console.error("Error:", error);
                statusEl.innerHTML = `<span class="text-red-500"><b>এরর:</b> ${error.message} <br><br><small>নোট: ব্রাউজার থেকে সরাসরি কলের জন্য CORS পলিসি বা প্রক্সি সমস্যা হতে পারে।</small></span>`;
            }
        }

        // ফেস সোয়াপ ট্রিগার
        function generateFaceSwap() {
            const videoUrl = document.getElementById('fsVideoUrl').value;
            const imageUrl = document.getElementById('fsImageUrl').value;
            
            if(!videoUrl || !imageUrl) {
                alert("দয়া করে ভিডিও এবং ছবির লিংক দিন।");
                return;
            }

            // lucataco/faceswap মডেল ভার্সন
            const modelVersion = "9a4298548422074c3f57258c5d544497314ae4112df80d116f0d2109e843d20d";
            const input = {
                target_video: videoUrl,
                swap_image: imageUrl
            };

            runReplicateModel(modelVersion, input, 'fsStatus', 'fsResultVideo');
        }

        // ছবি থেকে ভিডিও ট্রিগার
        function generateImageToVideo() {
            const imageUrl = document.getElementById('i2vImageUrl').value;
            
            if(!imageUrl) {
                alert("দয়া করে একটি ছবির লিংক দিন।");
                return;
            }

            // stability-ai/stable-video-diffusion মডেল ভার্সন
            const modelVersion = "3f0457e4619daac51203dedb472816fd4af51f3149fa7a9e0b5ffcf1b8172438";
            const input = {
                cond_aug: 0.02,
                decoding_t: 7,
                input_image: imageUrl,
                video_length: "14_frames_with_svd",
                sizing_strategy: "maintain_aspect_ratio",
                frames_per_second: 6
            };

            runReplicateModel(modelVersion, input, 'i2vStatus', 'i2vResultVideo');
        }
    </script>
</body>
</html>
