<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ভিডিও মেকার - প্রো সংস্করণ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .loader-ring { border: 3px solid #e2e8f0; border-top: 3px solid #6366f1; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [apiKey, setApiKey] = useState('');
            const [tab, setTab] = useState('faceSwap');
            const [uploading, setUploading] = useState(false);
            const [processing, setProcessing] = useState(false);
            const [status, setStatus] = useState('');
            const [error, setError] = useState('');
            const [result, setResult] = useState(null);

            // ফাইল লিঙ্কগুলো
            const [vUrl, setVUrl] = useState('');
            const [fUrl, setFUrl] = useState('');
            const [iUrl, setIUrl] = useState('');

            const proxy = "https://corsproxy.io/?";

            // আরও শক্তিশালী ফাইল আপলোড ফাংশন
            const uploadToFileIo = async (e, setter) => {
                const file = e.target.files[0];
                if (!file) return;

                // ফাইল সাইজ চেক (৫ মেগাবাইটের বেশি হলে সতর্ক করা ভালো, যদিও মডেল বড় ফাইল নেয়)
                setUploading(true);
                setError('');
                setStatus('ফাইল আপলোড হচ্ছে...');

                const formData = new FormData();
                formData.append('file', file);

                try {
                    // file.io ব্যবহার করা হচ্ছে যা অনেক বেশি নির্ভরযোগ্য
                    const res = await fetch('https://file.io', {
                        method: 'POST',
                        body: formData
                    });
                    
                    const data = await res.json();
                    
                    if (data.success) {
                        setter(data.link);
                        setStatus('আপলোড সফল হয়েছে!');
                    } else {
                        throw new Error("সার্ভার ফাইলটি গ্রহণ করেনি।");
                    }
                } catch (err) {
                    console.error(err);
                    setError("আপলোড এরর: " + err.message + ". অন্য একটি ব্রাউজার বা নেটওয়ার্ক ট্রাই করুন।");
                } finally {
                    setUploading(false);
                }
            };

            const startAI = async () => {
                if (!apiKey) return setError("API Key প্রয়োজন।");
                
                setProcessing(true);
                setError('');
                setResult(null);
                setStatus("এআই মডেলের সাথে যোগাযোগ করা হচ্ছে...");

                const model = tab === 'faceSwap' 
                    ? "9a4298548422074c3f57258c5d544497314ae4112df80d116f0d2109e843d20d"
                    : "3f0457e4619daac51203dedb472816fd4af51f3149fa7a9e0b5ffcf1b8172438";
                
                const input = tab === 'faceSwap'
                    ? { target_video: vUrl, swap_image: fUrl }
                    : { input_image: iUrl };

                try {
                    const res = await fetch(proxy + encodeURIComponent("https://api.replicate.com/v1/predictions"), {
                        method: 'POST',
                        headers: { 
                            'Authorization': `Token ${apiKey}`, 
                            'Content-Type': 'application/json' 
                        },
                        body: JSON.stringify({ version: model, input })
                    });
                    
                    let data = await res.json();
                    if (!res.ok) throw new Error(data.detail || "API কী ভুল বা মেয়াউ উত্তীর্ণ।");

                    while (data.status !== 'succeeded' && data.status !== 'failed') {
                        await new Promise(r => setTimeout(r, 4000));
                        setStatus(`প্রসেসিং চলছে... অবস্থা: ${data.status}`);
                        const check = await fetch(proxy + encodeURIComponent(data.urls.get), {
                            headers: { 'Authorization': `Token ${apiKey}` }
                        });
                        data = await check.json();
                    }

                    if (data.status === 'succeeded') {
                        setResult(data.output);
                        setStatus("ভিডিও তৈরি সম্পন্ন!");
                    } else {
                        throw new Error("মডেল ভিডিও তৈরি করতে পারেনি। সঠিক ফাইল ব্যবহার করুন।");
                    }
                } catch (err) {
                    setError(err.message);
                } finally {
                    setProcessing(false);
                }
            };

            return (
                <div className="flex flex-col items-center min-h-screen p-4 py-10">
                    <div className="w-full max-w-lg glass p-6 sm:p-8 rounded-[2.5rem] shadow-xl border border-white/50">
                        <div className="text-center mb-8">
                            <h1 className="text-3xl font-extrabold text-indigo-700">AI ভিডিও মেকার</h1>
                            <p className="text-slate-400 text-xs mt-1">সবচেয়ে আধুনিক উপায়ে ফেস সোয়াপ করুন</p>
                        </div>

                        {/* API Key */}
                        <div className="mb-6">
                            <label className="text-[10px] font-bold text-indigo-400 uppercase tracking-widest px-1">API TOKEN</label>
                            <input 
                                type="password" 
                                value={apiKey} 
                                onChange={e => setApiKey(e.target.value)}
                                placeholder="r8_..." 
                                className="w-full mt-1 bg-slate-50 border border-slate-200 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-indigo-400 transition-all text-sm"
                            />
                        </div>

                        {/* Tabs */}
                        <div className="flex bg-slate-100 p-1.5 rounded-2xl mb-8">
                            <button onClick={() => {setTab('faceSwap'); setError(''); setResult(null);}} className={`flex-1 py-3 text-sm font-bold rounded-xl transition-all ${tab === 'faceSwap' ? 'bg-white shadow text-indigo-600' : 'text-slate-500'}`}>ফেস সোয়াপ</button>
                            <button onClick={() => {setTab('imgToVideo'); setError(''); setResult(null);}} className={`flex-1 py-3 text-sm font-bold rounded-xl transition-all ${tab === 'imgToVideo' ? 'bg-white shadow text-indigo-600' : 'text-slate-500'}`}>ছবি থেকে ভিডিও</button>
                        </div>

                        {/* Controls */}
                        <div className="space-y-4">
                            {tab === 'faceSwap' ? (
                                <div className="space-y-3">
                                    <div className="relative">
                                        <input type="file" accept="video/*" onChange={e => uploadToFileIo(e, setVUrl)} className="hidden" id="v_in" />
                                        <label htmlFor="v_in" className={`w-full flex flex-col items-center justify-center p-5 border-2 border-dashed rounded-3xl cursor-pointer transition-all ${vUrl ? 'border-indigo-500 bg-indigo-50/30' : 'border-slate-200 bg-slate-50 hover:bg-slate-100'}`}>
                                            <span className="text-sm font-bold text-slate-600">{vUrl ? "✅ ভিডিও পাওয়া গেছে" : "📁 টার্গেট ভিডিও ফাইল"}</span>
                                        </label>
                                    </div>
                                    <div className="relative">
                                        <input type="file" accept="image/*" onChange={e => uploadToFileIo(e, setFUrl)} className="hidden" id="f_in" />
                                        <label htmlFor="f_in" className={`w-full flex flex-col items-center justify-center p-5 border-2 border-dashed rounded-3xl cursor-pointer transition-all ${fUrl ? 'border-indigo-500 bg-indigo-50/30' : 'border-slate-200 bg-slate-50 hover:bg-slate-100'}`}>
                                            <span className="text-sm font-bold text-slate-600">{fUrl ? "✅ মুখের ছবি রেডি" : "👤 নতুন মুখের ছবি"}</span>
                                        </label>
                                    </div>
                                </div>
                            ) : (
                                <div className="relative">
                                    <input type="file" accept="image/*" onChange={e => uploadToFileIo(e, setIUrl)} className="hidden" id="i_in" />
                                    <label htmlFor="i_in" className={`w-full flex flex-col items-center justify-center p-8 border-2 border-dashed rounded-3xl cursor-pointer transition-all ${iUrl ? 'border-indigo-500 bg-indigo-50/30' : 'border-slate-200 bg-slate-50 hover:bg-slate-100'}`}>
                                        <span className="text-sm font-bold text-slate-600">{iUrl ? "✅ ছবি আপলোড হয়েছে" : "🖼️ রেফারেন্স ছবি সিলেক্ট করুন"}</span>
                                    </label>
                                </div>
                            )}

                            <button 
                                onClick={startAI} 
                                disabled={processing || uploading || (tab === 'faceSwap' ? (!vUrl || !fUrl) : !iUrl)}
                                className="w-full bg-indigo-600 text-white font-bold py-5 rounded-[1.5rem] shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all disabled:bg-slate-300 disabled:shadow-none mt-4"
                            >
                                {uploading ? "ফাইল আপলোড হচ্ছে..." : processing ? "প্রসেসিং হচ্ছে..." : "ভিডিও তৈরি শুরু করুন"}
                            </button>
                        </div>

                        {/* Notifications */}
                        {(status || error) && (
                            <div className={`mt-8 p-4 rounded-2xl text-center text-xs font-bold ${error ? 'bg-red-50 text-red-500 border border-red-100' : 'text-indigo-600'}`}>
                                {processing && <div className="loader-ring"></div>}
                                {error ? `⚠️ এরর: ${error}` : status}
                            </div>
                        )}

                        {/* Result */}
                        {result && (
                            <div className="mt-8">
                                <video src={result} controls className="w-full rounded-3xl shadow-2xl border-4 border-white" autoPlay loop />
                                <div className="mt-4 flex justify-center">
                                    <a href={result} target="_blank" className="text-xs font-bold text-indigo-600 underline">গ্যালারিতে সেভ করতে এখানে ক্লিক করুন</a>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

```
