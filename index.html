<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ভিডিও মেকার - আলটিমেট ফিক্স</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background: #f0f2f5; }
        .app-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.5); }
        .btn-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [apiKey, setApiKey] = useState('');
            const [tab, setTab] = useState('faceSwap');
            const [loading, setLoading] = useState(false);
            const [status, setStatus] = useState('');
            const [error, setError] = useState('');
            const [result, setResult] = useState(null);

            // ফাইল পাথ/লিংক স্টেট
            const [vUrl, setVUrl] = useState('');
            const [fUrl, setFUrl] = useState('');
            const [iUrl, setIUrl] = useState('');

            // শক্তিশালী প্রক্সি
            const proxy = "https://corsproxy.io/?";

            // ফাইল আপলোড ফাংশন (মোবাইল ফ্রেন্ডলি)
            const handleUpload = async (e, setter) => {
                const file = e.target.files[0];
                if (!file) return;

                setStatus('ফাইল প্রসেস হচ্ছে...');
                setError('');
                
                const formData = new FormData();
                formData.append('file', file);

                try {
                    // Catbox (মোবাইলে সবচেয়ে ভালো কাজ করে)
                    const uploadRes = await fetch(proxy + encodeURIComponent('https://catbox.moe/user/api.php'), {
                        method: 'POST',
                        body: new URLSearchParams({
                            reqtype: 'fileupload',
                            file: '' // ক্যাশ বাউন্ডারি
                        })
                    });
                    
                    // নোট: সরাসরি প্রক্সি দিয়ে multipart/form-data হ্যান্ডলিং অনেক সময় ফেইল করে।
                    // তাই আমরা tmpfiles ব্যবহার করছি আবার তবে আরও ক্লিন ভাবে।
                    const res = await fetch('https://tmpfiles.org/api/v1/upload', {
                        method: 'POST',
                        body: formData
                    });
                    
                    const data = await res.json();
                    if (data.status === 'success') {
                        const direct = data.data.url.replace('tmpfiles.org/', 'tmpfiles.org/dl/');
                        setter(direct);
                        setStatus('আপলোড সফল!');
                    } else {
                        throw new Error("আপলোড সার্ভার কানেক্ট হতে পারছে না।");
                    }
                } catch (err) {
                    setError("আপলোড এরর! লিংকের মাধ্যমে চেষ্টা করুন অথবা আবার ট্রাই করুন।");
                    console.error(err);
                } finally {
                    setTimeout(() => setStatus(''), 3000);
                }
            };

            const generate = async () => {
                if (!apiKey) return setError("API Key দিন।");
                setLoading(true);
                setError('');
                setResult(null);
                setStatus("AI মডেল রেডি হচ্ছে...");

                const model = tab === 'faceSwap' 
                    ? "9a4298548422074c3f57258c5d544497314ae4112df80d116f0d2109e843d20d"
                    : "3f0457e4619daac51203dedb472816fd4af51f3149fa7a9e0b5ffcf1b8172438";
                
                const input = tab === 'faceSwap'
                    ? { target_video: vUrl, swap_image: fUrl }
                    : { input_image: iUrl };

                try {
                    const res = await fetch(proxy + encodeURIComponent("https://api.replicate.com/v1/predictions"), {
                        method: 'POST',
                        headers: { 'Authorization': `Token ${apiKey}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ version: model, input })
                    });
                    
                    let data = await res.json();
                    if (!res.ok) throw new Error(data.detail || "API Key সমস্যা।");

                    while (data.status !== 'succeeded' && data.status !== 'failed') {
                        await new Promise(r => setTimeout(r, 4000));
                        setStatus(`ভিডিও তৈরি হচ্ছে... অবস্থা: ${data.status}`);
                        const check = await fetch(proxy + encodeURIComponent(data.urls.get), {
                            headers: { 'Authorization': `Token ${apiKey}` }
                        });
                        data = await check.json();
                    }

                    if (data.status === 'succeeded') {
                        setResult(data.output);
                        setStatus("তৈরি সম্পন্ন!");
                    } else {
                        throw new Error("AI ভিডিও তৈরি করতে ব্যর্থ হয়েছে।");
                    }
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="flex flex-col items-center min-h-screen p-4 py-8">
                    <div className="w-full max-w-md app-card p-8 rounded-[2.5rem] shadow-2xl border border-white">
                        <div className="text-center mb-6">
                            <h1 className="text-3xl font-bold text-indigo-700 tracking-tight">AI ভিডিও মেকার</h1>
                            <p className="text-slate-400 text-xs mt-1 font-medium">আপনার নিজের এআই ভিডিও স্টুডিও</p>
                        </div>

                        {/* API Key */}
                        <div className="mb-6">
                            <label className="text-[10px] font-bold text-indigo-400 uppercase tracking-widest px-1">আপনার API Token</label>
                            <input 
                                type="password" 
                                value={apiKey} 
                                onChange={e => setApiKey(e.target.value)}
                                placeholder="r8_..." 
                                className="w-full mt-1 bg-white border border-slate-200 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-indigo-400 text-sm shadow-sm"
                            />
                        </div>

                        {/* Tabs */}
                        <div className="flex bg-slate-200/50 p-1 rounded-2xl mb-8">
                            <button onClick={() => setTab('faceSwap')} className={`flex-1 py-3 text-xs font-bold rounded-xl transition-all ${tab === 'faceSwap' ? 'bg-white shadow text-indigo-600' : 'text-slate-500'}`}>ফেস সোয়াপ</button>
                            <button onClick={() => setTab('imgToVideo')} className={`flex-1 py-3 text-xs font-bold rounded-xl transition-all ${tab === 'imgToVideo' ? 'bg-white shadow text-indigo-600' : 'text-slate-500'}`}>ছবি থেকে ভিডিও</button>
                        </div>

                        {/* Forms */}
                        <div className="space-y-4">
                            {tab === 'faceSwap' ? (
                                <>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase px-1">টার্গেট ভিডিও</label>
                                        <input type="file" accept="video/*" onChange={e => handleUpload(e, setVUrl)} className="hidden" id="v_in" />
                                        <label htmlFor="v_in" className={`w-full flex items-center justify-between p-4 border-2 border-dashed rounded-2xl cursor-pointer ${vUrl ? 'border-green-400 bg-green-50' : 'border-slate-200'}`}>
                                            <span className="text-xs font-bold text-slate-600 truncate max-w-[180px]">{vUrl ? "✅ ভিডিও রেডি" : "📁 ভিডিও ফাইল"}</span>
                                            <span className="text-[10px] bg-slate-100 px-2 py-1 rounded-md text-slate-400">আপলোড</span>
                                        </label>
                                        {/* Fallback Input */}
                                        <input type="url" value={vUrl} onChange={e => setVUrl(e.target.value)} placeholder="অথবা সরাসরি ভিডিও লিংক দিন" className="w-full text-[10px] p-2 bg-transparent border-b outline-none focus:border-indigo-400" />
                                    </div>

                                    <div className="space-y-2">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase px-1">নতুন মুখের ছবি</label>
                                        <input type="file" accept="image/*" onChange={e => handleUpload(e, setFUrl)} className="hidden" id="f_in" />
                                        <label htmlFor="f_in" className={`w-full flex items-center justify-between p-4 border-2 border-dashed rounded-2xl cursor-pointer ${fUrl ? 'border-green-400 bg-green-50' : 'border-slate-200'}`}>
                                            <span className="text-xs font-bold text-slate-600">{fUrl ? "✅ ছবি পাওয়া গেছে" : "👤 ফেস ছবি"}</span>
                                            <span className="text-[10px] bg-slate-100 px-2 py-1 rounded-md text-slate-400">আপলোড</span>
                                        </label>
                                        <input type="url" value={fUrl} onChange={e => setFUrl(e.target.value)} placeholder="অথবা ছবির লিংক দিন" className="w-full text-[10px] p-2 bg-transparent border-b outline-none focus:border-indigo-400" />
                                    </div>
                                </>
                            ) : (
                                <div className="space-y-4">
                                    <input type="file" accept="image/*" onChange={e => handleUpload(e, setIUrl)} className="hidden" id="i_in" />
                                    <label htmlFor="i_in" className={`w-full flex flex-col items-center justify-center p-8 border-2 border-dashed rounded-3xl cursor-pointer ${iUrl ? 'border-green-400 bg-green-50' : 'border-slate-200'}`}>
                                        <span className="text-sm font-bold text-slate-600">{iUrl ? "✅ ছবি আপলোড হয়েছে" : "🖼️ রেফারেন্স ছবি"}</span>
                                    </label>
                                    <input type="url" value={iUrl} onChange={e => setIUrl(e.target.value)} placeholder="অথবা সরাসরি ছবির লিংক (URL) দিন" className="w-full text-[10px] p-2 bg-transparent border-b outline-none focus:border-indigo-400" />
                                </div>
                            )}

                            <button 
                                onClick={generate} 
                                disabled={loading || (!vUrl && !fUrl && !iUrl)}
                                className="w-full btn-gradient text-white font-bold py-5 rounded-[1.5rem] shadow-xl shadow-indigo-200 disabled:opacity-50 mt-4 active:scale-95 transition-all"
                            >
                                {loading ? <span className="flex items-center justify-center"><span className="pulse">প্রসেসিং চলছে...</span></span> : "ভিডিও তৈরি শুরু করুন"}
                            </button>
                        </div>

                        {/* Status/Error */}
                        {(status || error) && (
                            <div className={`mt-6 p-4 rounded-2xl text-[11px] font-bold text-center ${error ? 'bg-red-50 text-red-500' : 'bg-indigo-50 text-indigo-600 animate-pulse'}`}>
                                {error ? `⚠️ ভুল: ${error}` : status}
                            </div>
                        )}

                        {/* Result */}
                        {result && (
                            <div className="mt-8 animate-in zoom-in duration-500">
                                <video src={result} controls className="w-full rounded-3xl shadow-2xl border-2 border-white" autoPlay loop />
                                <div className="mt-4 flex justify-center">
                                    <a href={result} target="_blank" className="text-[10px] font-bold text-indigo-500 underline uppercase tracking-tighter">গ্যালারিতে সেভ করতে এখানে ক্লিক করুন</a>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

```
