```html
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ভিডিও মেকার - সরাসরি আপলোড</title>
    <!-- স্টাইলিং এবং লাইব্রেরি -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [apiKey, setApiKey] = useState('');
            const [activeTab, setActiveTab] = useState('faceSwap');
            const [loading, setLoading] = useState(false);
            const [uploading, setUploading] = useState(false);
            const [status, setStatus] = useState('');
            const [error, setError] = useState('');
            const [result, setResult] = useState(null);

            // ফাইল URLs
            const [targetVid, setTargetVid] = useState('');
            const [sourceImg, setSourceImg] = useState('');
            const [refImg, setRefImg] = useState('');

            const proxy = "https://corsproxy.io/?";

            // ফাইল আপলোড করার ফাংশন
            const handleUpload = async (e, setter) => {
                const file = e.target.files[0];
                if (!file) return;

                setUploading(true);
                setError('');
                const formData = new FormData();
                formData.append('file', file);

                try {
                    const res = await fetch('https://tmpfiles.org/api/v1/upload', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await res.json();
                    if (data.status === 'success') {
                        const directLink = data.data.url.replace('tmpfiles.org/', 'tmpfiles.org/dl/');
                        setter(directLink);
                    } else {
                        throw new Error("আপলোড ব্যর্থ হয়েছে");
                    }
                } catch (err) {
                    setError("ফাইল আপলোড করতে সমস্যা হয়েছে। আবার চেষ্টা করুন।");
                } finally {
                    setUploading(false);
                }
            };

            const runAI = async () => {
                if (!apiKey) return setError("দয়া করে API Key দিন");
                setLoading(true);
                setError('');
                setResult(null);
                setStatus("রিকোয়েস্ট পাঠানো হচ্ছে...");

                const model = activeTab === 'faceSwap' 
                    ? "9a4298548422074c3f57258c5d544497314ae4112df80d116f0d2109e843d20d" 
                    : "3f0457e4619daac51203dedb472816fd4af51f3149fa7a9e0b5ffcf1b8172438";
                
                const input = activeTab === 'faceSwap' 
                    ? { target_video: targetVid, swap_image: sourceImg }
                    : { input_image: refImg };

                try {
                    const response = await fetch(proxy + encodeURIComponent("https://api.replicate.com/v1/predictions"), {
                        method: 'POST',
                        headers: { 'Authorization': `Token ${apiKey}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ version: model, input })
                    });
                    
                    let prediction = await response.json();
                    if (!response.ok) throw new Error(prediction.detail || "API Error");

                    while (prediction.status !== 'succeeded' && prediction.status !== 'failed') {
                        await new Promise(r => setTimeout(r, 4000));
                        setStatus(`প্রসেস হচ্ছে... (${prediction.status})`);
                        const check = await fetch(proxy + encodeURIComponent(prediction.urls.get), {
                            headers: { 'Authorization': `Token ${apiKey}` }
                        });
                        prediction = await check.json();
                    }

                    if (prediction.status === 'succeeded') {
                        setResult(prediction.output);
                    } else {
                        throw new Error("ভিডিও তৈরি ব্যর্থ হয়েছে।");
                    }
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="max-w-md mx-auto p-4 pt-10">
                    <div className="bg-white rounded-3xl shadow-2xl p-6 border border-slate-100">
                        <h1 class="text-2xl font-bold text-indigo-600 text-center mb-6">AI ভিডিও মেকার</h1>
                        
                        <div className="mb-6">
                            <label className="text-xs font-bold text-slate-400 block mb-1">REPLICATE API KEY</label>
                            <input type="password" value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder="r8_..." className="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" />
                        </div>

                        <div className="flex bg-slate-100 p-1 rounded-xl mb-6">
                            <button onClick={() => setActiveTab('faceSwap')} className={`flex-1 py-2 text-sm font-bold rounded-lg ${activeTab === 'faceSwap' ? 'bg-white shadow text-indigo-600' : 'text-slate-500'}`}>ফেস সোয়াপ</button>
                            <button onClick={() => setActiveTab('imgToVideo')} className={`flex-1 py-2 text-sm font-bold rounded-lg ${activeTab === 'imgToVideo' ? 'bg-white shadow text-indigo-600' : 'text-gray-500'}`}>ছবি থেকে ভিডিও</button>
                        </div>

                        <div className="space-y-4">
                            {activeTab === 'faceSwap' ? (
                                <>
                                    <div className="border-2 border-dashed rounded-2xl p-4 text-center">
                                        <input type="file" accept="video/*" onChange={e => handleUpload(e, setTargetVid)} className="hidden" id="vfile" />
                                        <label htmlFor="vfile" className="cursor-pointer block text-sm text-slate-600">
                                            {targetVid ? "✅ ভিডিও আপলোড হয়েছে" : "📁 ভিডিও ফাইল আপলোড করুন"}
                                        </label>
                                    </div>
                                    <div className="border-2 border-dashed rounded-2xl p-4 text-center">
                                        <input type="file" accept="image/*" onChange={e => handleUpload(e, setSourceImg)} className="hidden" id="ifile" />
                                        <label htmlFor="ifile" className="cursor-pointer block text-sm text-slate-600">
                                            {sourceImg ? "✅ ছবি আপলোড হয়েছে" : "📁 মুখের ছবি আপলোড করুন"}
                                        </label>
                                    </div>
                                </>
                            ) : (
                                <div className="border-2 border-dashed rounded-2xl p-4 text-center">
                                    <input type="file" accept="image/*" onChange={e => handleUpload(e, setRefImg)} className="hidden" id="rfile" />
                                    <label htmlFor="rfile" className="cursor-pointer block text-sm text-slate-600">
                                        {refImg ? "✅ ছবি আপলোড হয়েছে" : "📁 রেফারেন্স ছবি আপলোড করুন"}
                                    </label>
                                </div>
                            )}

                            <button onClick={runAI} disabled={loading || uploading} className="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-100 disabled:bg-slate-300">
                                {loading ? status : uploading ? "ফাইল আপলোড হচ্ছে..." : "ভিডিও তৈরি শুরু করুন"}
                            </button>
                        </div>

                        {error && <div className="mt-4 p-3 bg-red-50 text-red-500 text-xs rounded-xl text-center font-medium">{error}</div>}

                        {result && (
                            <div className="mt-6">
                                <video src={result} controls className="w-full rounded-2xl shadow-lg border-4 border-white" autoPlay loop />
                                <a href={result} target="_blank" className="block text-center mt-3 text-indigo-600 text-sm font-bold">ভিডিও ডাউনলোড করুন</a>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

```
